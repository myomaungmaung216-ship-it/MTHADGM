<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pattern Memory - MTHADGM</title>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { margin: 0; background: #1a1a2e; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .grid { display: grid; grid-template-columns: repeat(4, 70px); grid-gap: 10px; margin: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; }
        .cell { width: 70px; height: 70px; background: #16213e; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid #0f3460; }
        .active { background: #f1c40f !important; transform: scale(0.9); }
        .error { background: #e94560 !important; }
        #status { margin: 15px; font-weight: bold; font-size: 20px; color: #4ecca3; height: 30px; }
        button { padding: 12px 30px; font-size: 18px; cursor: pointer; background: #0f3460; color: #4ecca3; border: 2px solid #4ecca3; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>Pattern Memory</h1>
    <div id="status">PRESS START</div>
    <div class="grid" id="grid"></div>
    <button onclick="startGame()">START GAME</button>

    <script>
        const AdController = window.Adsgram.init({ blockId: "27256" });
        const grid = document.getElementById('grid');
        const statusDisplay = document.getElementById('status');
        let sequence = [], userSequence = [], canClick = false;

        // အကွက် ၁၆ ကွက်ကို အရင်ဖန်တီးမယ်
        for (let i = 0; i < 16; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.id = i;
            cell.onclick = () => handleCellClick(i);
            grid.appendChild(cell);
        }

        function startGame() {
            sequence = [];
            nextLevel();
        }

        function nextLevel() {
            userSequence = [];
            canClick = false;
            statusDisplay.innerText = "WATCHING...";
            sequence.push(Math.floor(Math.random() * 16));
            showSequence();
        }

        async function showSequence() {
            for (let id of sequence) {
                await new Promise(r => setTimeout(r, 600));
                flashCell(id, 'active');
            }
            statusDisplay.innerText = "YOUR TURN!";
            canClick = true;
        }

        function flashCell(id, cls) {
            const el = grid.children[id];
            el.classList.add(cls);
            setTimeout(() => el.classList.remove(cls), 400);
        }

        function handleCellClick(id) {
            if (!canClick) return;
            flashCell(id, 'active');
            userSequence.push(id);

            if (userSequence[userSequence.length - 1] !== sequence[userSequence.length - 1]) {
                gameOver();
                return;
            }

            if (userSequence.length === sequence.length) {
                canClick = false;
                setTimeout(nextLevel, 800);
            }
        }

        function gameOver() {
            canClick = false;
            statusDisplay.innerText = "GAME OVER!";
            
            // ကြော်ငြာပြဖို့ ခေါ်ယူခြင်း
            AdController.show().then(() => {
                alert("Game Restarting...");
                startGame();
            }).catch(() => {
                startGame();
            });
        }
    </script>
</body>
</html>
