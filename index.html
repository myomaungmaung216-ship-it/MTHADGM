<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTHADGM Game</title>
    <!-- Adsgram Script -->
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; text-align: center; font-family: sans-serif; }
        canvas { display: block; margin: auto; background: #333; }
        #ad-status { margin-top: 10px; color: #ffeb3b; }
    </style>
</head>
<body>

    <h2>CHUNK JUMP</h2>
    <canvas id="gameCanvas" width="360" height="640"></canvas>
    <div id="ad-status"></div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Adsgram Initialization (မင်းရဲ့ ID 27256 ကို ဒီမှာ ထည့်ထားတယ်)
        const AdController = window.Adsgram.init({ blockId: "27256" });

        function showAd() {
            document.getElementById("ad-status").innerText = "ကြော်ငြာ Loading ဖြစ်နေသည်...";
            
            AdController.show().then((result) => {
                // ကြော်ငြာကြည့်ပြီးရင် ဖြစ်မယ့်အရာ
                document.getElementById("ad-status").innerText = "ကြော်ငြာ ကြည့်ရှုမှု အောင်မြင်သည်။ Reward ရပါပြီ!";
                resetGame(); 
            }).catch((result) => {
                // Error ဖြစ်ရင် သို့မဟုတ် ကြော်ငြာပိတ်လိုက်ရင်
                document.getElementById("ad-status").innerText = "ကြော်ငြာပြသရန် အခက်အခဲရှိသည် သို့မဟုတ် ပိတ်လိုက်သည်။";
                console.log(result);
                resetGame();
            });
        }

        // ဂိမ်းအပိုင်း (နမူနာ Platformer Logic)
        let gameOver = false;
        function resetGame() {
            gameOver = false;
            alert("ဂိမ်းအသစ် ပြန်စပါပြီ!");
        }

        // ဂိမ်းရှုံးတဲ့အခါ showAd() ကို ခေါ်ပေးရပါမယ်
        canvas.addEventListener("click", () => {
            if (!gameOver) {
                gameOver = true;
                showAd(); // ကြော်ငြာပြရန် ခေါ်လိုက်ခြင်း
            }
        });

        ctx.fillStyle = "white";
        ctx.fillText("ဂိမ်းစရန် မျက်နှာပြင်ကို နှိပ်ပါ", 100, 300);
    </script>
</body>
</html>
