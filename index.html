<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory</title>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { margin: 0; background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(4, 70px); grid-gap: 10px; margin-top: 20px; }
        .cell { width: 70px; height: 70px; background: #16213e; border: 1px solid #4ecca3; border-radius: 8px; }
        .active { background: #f1c40f !important; }
        #status { margin-bottom: 20px; font-size: 24px; color: #4ecca3; }
        button { padding: 10px 30px; font-size: 18px; background: #4ecca3; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="status">Pattern Memory</div>
    <div class="grid" id="grid"></div><br>
    <button onclick="startGame()">RESTART</button>

    <script>
        const AdController = window.Adsgram.init({ blockId: "27256" });
        const grid = document.getElementById('grid');
        
        // အကွက်တွေ အမြဲပေါ်နေအောင် လုပ်ထားတယ်
        for (let i = 0; i < 16; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.id = i;
            cell.onclick = () => handleCellClick(i);
            grid.appendChild(cell);
        }

        let sequence = [], userSequence = [], canClick = false;

        function startGame() {
            sequence = [];
            nextLevel();
        }

        function nextLevel() {
            userSequence = [];
            canClick = false;
            document.getElementById('status').innerText = "WATCHING...";
            sequence.push(Math.floor(Math.random() * 16));
            showSequence();
        }

        async function showSequence() {
            for (let id of sequence) {
                await new Promise(r => setTimeout(r, 600));
                const el = grid.children[id];
                el.classList.add('active');
                setTimeout(() => el.classList.remove('active'), 400);
            }
            document.getElementById('status').innerText = "YOUR TURN!";
            canClick = true;
        }

        function handleCellClick(id) {
            if (!canClick) return;
            grid.children[id].classList.add('active');
            setTimeout(() => grid.children[id].classList.remove('active'), 200);
            userSequence.push(id);

            if (userSequence[userSequence.length-1] !== sequence[userSequence.length-1]) {
                gameOver();
                return;
            }
            if (userSequence.length === sequence.length) {
                canClick = false;
                setTimeout(nextLevel, 800);
            }
        }

        function gameOver() {
            canClick = false;
            document.getElementById('status').innerText = "GAME OVER!";
            // ကြော်ငြာပြခြင်း
            AdController.show().then(() => startGame()).catch(() => startGame());
        }
    </script>
</body>
</html>
